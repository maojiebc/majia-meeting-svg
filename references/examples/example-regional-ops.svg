<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 2520" width="100%" style="max-width: 440px;">
  <style>
    text { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  </style>
  <rect width="440" height="2520" rx="16" fill="#F7F8FA"/>

  <rect x="20" y="20" width="400" height="80" rx="12" fill="#1A1A2E"/>
  <text x="220" y="50" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold">品牌会员 × 某省分公司</text>
  <text x="220" y="76" text-anchor="middle" fill="#A0A0B8" font-size="14">会员推进对齐会</text>

  <rect x="20" y="120" width="400" height="340" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="120" width="400" height="38" rx="12" fill="#4A6CF7"/>
  <rect x="20" y="146" width="400" height="12" fill="#4A6CF7"/>
  <text x="36" y="145" fill="#FFFFFF" font-size="15" font-weight="bold">议题一 · 会员培训（线上→线下）</text>
  <text x="36" y="182" fill="#333" font-size="14" font-weight="bold">结论：改为线下培训</text>
  <text x="36" y="204" fill="#555" font-size="13">原计划线上短时培训，改为随该省加盟商</text>
  <text x="36" y="224" fill="#555" font-size="13">经营大会线下进行，感染力更强</text>
  <text x="36" y="254" fill="#333" font-size="14" font-weight="bold">时间</text>
  <text x="36" y="276" fill="#555" font-size="13">• 近期安排（具体待培训中心排期）</text>
  <text x="36" y="296" fill="#555" font-size="13">• 培训为期约一周，分批次进行</text>
  <text x="36" y="326" fill="#333" font-size="14" font-weight="bold">内容</text>
  <text x="36" y="348" fill="#555" font-size="13">• 会员价值宣导 + 未完成任务门店重申</text>
  <text x="36" y="368" fill="#555" font-size="13">• 该省会员拉新历史数据展示</text>
  <text x="36" y="388" fill="#555" font-size="13">• 会员运营方式方法（新增内容）</text>
  <rect x="36" y="404" width="370" height="42" rx="6" fill="#EBF5FB"/>
  <text x="46" y="420" fill="#2471A3" font-size="12">分公司：与培训中心协调排期，给会员留出时段</text>
  <text x="46" y="438" fill="#2471A3" font-size="12">总部方：调整课件为线下版，提前同步审核</text>

  <rect x="20" y="480" width="400" height="460" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="480" width="400" height="38" rx="12" fill="#27AE60"/>
  <rect x="20" y="506" width="400" height="12" fill="#27AE60"/>
  <text x="36" y="505" fill="#FFFFFF" font-size="15" font-weight="bold">议题二 · 会员价在该省推广</text>
  <text x="36" y="542" fill="#333" font-size="14" font-weight="bold">试点验证结果</text>
  <text x="36" y="564" fill="#555" font-size="13">• 两家试点门店，会员营收占比均达标</text>
  <text x="36" y="584" fill="#555" font-size="13">  （目标及格线XX%，优秀XX%）</text>
  <text x="36" y="604" fill="#555" font-size="13">• 拉新、新客、堂食转化均有明显提升</text>
  <text x="36" y="634" fill="#333" font-size="14" font-weight="bold">推广节奏（达成共识）</text>
  <rect x="36" y="648" width="370" height="48" rx="8" fill="#E8F8F5"/>
  <text x="46" y="666" fill="#1E8449" font-size="13" font-weight="bold">第一批 · 培训前</text>
  <text x="46" y="684" fill="#1E8449" font-size="12">优先选售价较高 + 配合度高的门店试点</text>
  <rect x="36" y="704" width="370" height="48" rx="8" fill="#E8F8F5"/>
  <text x="46" y="722" fill="#1E8449" font-size="13" font-weight="bold">第二批 · 培训后</text>
  <text x="46" y="740" fill="#1E8449" font-size="12">培训中展示试点数据，再大面积覆盖</text>
  <text x="36" y="772" fill="#333" font-size="14" font-weight="bold">定价策略讨论</text>
  <text x="36" y="794" fill="#555" font-size="13">• 统一折扣，换算为每斤便宜数元</text>
  <text x="36" y="814" fill="#555" font-size="13">• 会员价 = 真实售价，对外价略高</text>
  <rect x="36" y="830" width="370" height="56" rx="6" fill="#FFF3E0"/>
  <text x="46" y="848" fill="#E65100" font-size="13" font-weight="bold">分公司顾虑：先涨价再打折有舆情风险</text>
  <text x="46" y="866" fill="#E65100" font-size="12">建议：先从高价店推 → 跑出数据 → 低价店</text>
  <text x="46" y="882" fill="#E65100" font-size="12">调价后留缓冲期再上会员价，避免一刀切</text>
  <text x="36" y="912" fill="#999" font-size="13">节后提供第一批门店清单，开始配置</text>
  <text x="36" y="932" fill="#999" font-size="13">运营团队计划近期赴该省线下碰细节</text>

  <rect x="20" y="960" width="400" height="580" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="960" width="400" height="38" rx="12" fill="#E74C3C"/>
  <rect x="20" y="986" width="400" height="12" fill="#E74C3C"/>
  <text x="36" y="985" fill="#FFFFFF" font-size="15" font-weight="bold">议题三 · 节日活动方案</text>
  <text x="36" y="1020" fill="#333" font-size="14" font-weight="bold">活动机制</text>
  <rect x="36" y="1034" width="370" height="64" rx="8" fill="#FDEDEC"/>
  <text x="46" y="1052" fill="#C0392B" font-size="13" font-weight="bold">新会员</text>
  <text x="46" y="1070" fill="#555" font-size="13">注册即享折扣 + 赠兑换券</text>
  <text x="46" y="1088" fill="#555" font-size="12">扫码注册后券自动到卡包（有数秒延迟）</text>
  <rect x="36" y="1106" width="370" height="48" rx="8" fill="#EBF5FB"/>
  <text x="46" y="1124" fill="#2471A3" font-size="13" font-weight="bold">老会员</text>
  <text x="46" y="1142" fill="#555" font-size="13">不打折，赠兑换券（小程序菜单栏领取）</text>
  <text x="36" y="1176" fill="#333" font-size="14" font-weight="bold">兑换券细节</text>
  <text x="36" y="1198" fill="#555" font-size="13">• POS系统配置价值，小票显示减免金额</text>
  <text x="36" y="1218" fill="#555" font-size="13">• 前端不对外展示价格</text>
  <text x="36" y="1238" fill="#555" font-size="13">• 兑换品种不限，门店自行安排</text>
  <text x="36" y="1258" fill="#555" font-size="13">• 每人限领一次，仅活动期间有效</text>
  <text x="36" y="1290" fill="#333" font-size="14" font-weight="bold">供应链补贴</text>
  <text x="36" y="1312" fill="#555" font-size="13">• 每拉一个新会员，门店获冻品券补贴</text>
  <text x="36" y="1332" fill="#555" font-size="13">• 补贴发放节奏：争取短周期结算</text>
  <text x="36" y="1362" fill="#333" font-size="14" font-weight="bold">物料</text>
  <text x="36" y="1384" fill="#555" font-size="13">• 不新增物料，利用现有收银台台卡/立牌</text>
  <text x="36" y="1404" fill="#555" font-size="13">• 新店未收到立牌的：临时打印二维码</text>
  <text x="36" y="1434" fill="#333" font-size="14" font-weight="bold">数据与激励</text>
  <text x="36" y="1456" fill="#555" font-size="13">• 每日定时自动更新各门店拉新数据</text>
  <text x="36" y="1476" fill="#555" font-size="13">• 分公司每日群内分享优秀门店，刺激其他</text>
  <rect x="36" y="1492" width="370" height="34" rx="6" fill="#F3E5F5"/>
  <text x="46" y="1514" fill="#6A1B9A" font-size="12">预期管理：首次跑通链路为主，数据可能一般</text>

  <rect x="20" y="1560" width="400" height="200" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="1560" width="400" height="38" rx="12" fill="#95A5A6"/>
  <rect x="20" y="1586" width="400" height="12" fill="#95A5A6"/>
  <text x="36" y="1585" fill="#FFFFFF" font-size="15" font-weight="bold">其他事项</text>
  <text x="36" y="1620" fill="#333" font-size="14" font-weight="bold">新店物料问题</text>
  <text x="36" y="1642" fill="#555" font-size="13">• 多家新店反馈未收到立牌</text>
  <text x="36" y="1662" fill="#555" font-size="13">• 总部会核查快递单号，逐一排查签收情况</text>
  <text x="36" y="1682" fill="#555" font-size="13">• 新店开业需在登记表填写，否则总部无法获知</text>
  <text x="36" y="1712" fill="#333" font-size="14" font-weight="bold">系统兼容问题</text>
  <text x="36" y="1734" fill="#555" font-size="13">• 部分手机系统链接打不开，需平台方更新</text>
  <text x="36" y="1754" fill="#999" font-size="12">暂无解，非我方可控</text>

  <rect x="20" y="1780" width="400" height="380" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="1780" width="400" height="38" rx="12" fill="#1A1A2E"/>
  <rect x="20" y="1806" width="400" height="12" fill="#1A1A2E"/>
  <text x="36" y="1805" fill="#FFFFFF" font-size="15" font-weight="bold">待办事项</text>
  <text x="36" y="1840" fill="#FF6B6B" font-size="14" font-weight="bold">总部会员团队（今日）</text>
  <rect x="36" y="1852" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="1867" fill="#333" font-size="13">今日下午前：券配置+领取链路发群</text>
  <rect x="36" y="1876" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="1891" fill="#333" font-size="13">核查新店立牌快递单号，列表发群</text>
  <rect x="36" y="1900" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="1915" fill="#333" font-size="13">搭建每日拉新数据自动报表</text>
  <rect x="36" y="1924" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="1939" fill="#333" font-size="13">优秀门店分享模板先做出来</text>
  <text x="36" y="1970" fill="#FF6B6B" font-size="14" font-weight="bold">总部会员团队（节后）</text>
  <rect x="36" y="1982" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="1997" fill="#333" font-size="13">培训课件改线下版，提前同步分公司</text>
  <rect x="36" y="2006" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="2021" fill="#333" font-size="13">接收门店清单，配置第一批会员价</text>
  <text x="36" y="2054" fill="#4ECDC4" font-size="14" font-weight="bold">该省分公司</text>
  <rect x="36" y="2066" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="2081" fill="#333" font-size="13">今日下午前：自营店测试活动链路</text>
  <rect x="36" y="2090" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="2105" fill="#333" font-size="13">与培训中心协调排期，确认会员培训时段</text>
  <rect x="36" y="2114" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="2129" fill="#333" font-size="13">各区筛选高售价+配合度高的门店清单</text>
  <rect x="36" y="2138" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="2153" fill="#333" font-size="13">活动期间每日群内分享优秀门店拉新数据</text>
</svg>
