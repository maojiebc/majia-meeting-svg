  <rect x="36" y="1010" width="8" height="40" rx="4" fill="#E67E22"/>
  <text x="54" y="1026" fill="#333" font-size="13" font-weight="bold">本周内</text>
  <text x="54" y="1044" fill="#555" font-size="12">双方确认投放城市，提供Logo素材</text>
  <rect x="36" y="1058" width="8" height="40" rx="4" fill="#E67E22"/>
  <text x="54" y="1074" fill="#333" font-size="13" font-weight="bold">下周</text>
  <text x="54" y="1092" fill="#555" font-size="12">出主KV + 搭建H5领券页 + 建券测试</text>
  <rect x="36" y="1106" width="8" height="4" rx="2" fill="#27AE60"/>

  <rect x="20" y="1140" width="400" height="360" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="1140" width="400" height="38" rx="12" fill="#1A1A2E"/>
  <rect x="20" y="1166" width="400" height="12" fill="#1A1A2E"/>
  <text x="36" y="1165" fill="#FFFFFF" font-size="15" font-weight="bold">待办清单</text>
  <text x="36" y="1200" fill="#FF6B6B" font-size="14" font-weight="bold">品牌A</text>
  <rect x="36" y="1212" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="1227" fill="#333" font-size="13">提供Logo + VI素材包（AI格式）</text>
  <rect x="36" y="1236" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="1251" fill="#333" font-size="13">建券 → 提供最终领券链接</text>
  <rect x="36" y="1260" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="1275" fill="#333" font-size="13">敲定重点城市 + 可落地门店数量</text>
  <rect x="36" y="1284" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="1299" fill="#333" font-size="13">各尺寸物料适配</text>
  <text x="36" y="1334" fill="#4ECDC4" font-size="14" font-weight="bold">品牌B</text>
  <rect x="36" y="1346" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="1361" fill="#333" font-size="13">确认朋友圈投放城市</text>
  <rect x="36" y="1370" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="1385" fill="#333" font-size="13">出主KV视觉 + 搭建H5领券页</text>
  <rect x="36" y="1394" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="1409" fill="#333" font-size="13">确认权益券面（免单+买赠+折扣）</text>
  <rect x="36" y="1418" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="1433" fill="#333" font-size="13">TV轮播素材上线</text>
  <rect x="36" y="1458" width="370" height="24" rx="4" fill="#E8F8F5"/>
  <text x="46" y="1475" fill="#1E8449" font-size="12">原则：小量快跑MVP，细水长流，不求大投入</text>

  <rect x="20" y="1520" width="400" height="120" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="1520" width="400" height="38" rx="12" fill="#95A5A6"/>
  <rect x="20" y="1546" width="400" height="12" fill="#95A5A6"/>
  <text x="36" y="1545" fill="#FFFFFF" font-size="15" font-weight="bold">备注</text>
  <text x="36" y="1580" fill="#555" font-size="13">• 品牌A为加盟体系，电子屏无法远程统控</text>
  <text x="36" y="1602" fill="#555" font-size="13">• 需提前两周给素材，内部审核不严格</text>
  <text x="36" y="1624" fill="#555" font-size="13">• 沟通方式：微信群为主，聊不清拉短会</text>
