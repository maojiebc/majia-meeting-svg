<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 1900" width="100%" style="max-width: 440px;">
  <style>
    text { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  </style>
  <rect width="440" height="1900" rx="16" fill="#F7F8FA"/>

  <rect x="20" y="20" width="400" height="80" rx="12" fill="#1A1A2E"/>
  <text x="220" y="48" text-anchor="middle" fill="#FFFFFF" font-size="19" font-weight="bold">餐饮品牌A × 茶饮品牌B</text>
  <text x="220" y="76" text-anchor="middle" fill="#A0A0B8" font-size="13">首次异业合作方案对齐 · 2025.06.01</text>

  <rect x="20" y="120" width="400" height="150" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="120" width="400" height="38" rx="12" fill="#8E44AD"/>
  <rect x="20" y="146" width="400" height="12" fill="#8E44AD"/>
  <text x="36" y="145" fill="#FFFFFF" font-size="15" font-weight="bold">双方核心诉求</text>
  <text x="36" y="180" fill="#333" font-size="14" font-weight="bold">茶饮品牌B</text>
  <text x="36" y="202" fill="#555" font-size="13">门店能看到品牌A的露出联动（品牌心智）</text>
  <text x="36" y="224" fill="#555" font-size="13">夏季场景互补，全国门店维度合作</text>
  <text x="36" y="248" fill="#333" font-size="14" font-weight="bold">餐饮品牌A</text>

  <rect x="20" y="290" width="400" height="220" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="290" width="400" height="38" rx="12" fill="#E74C3C"/>
  <rect x="20" y="316" width="400" height="12" fill="#E74C3C"/>
