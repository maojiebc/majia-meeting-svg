  <text x="36" y="350" fill="#333" font-size="14" font-weight="bold">线上</text>
  <text x="36" y="372" fill="#555" font-size="13">• 小程序 Banner + 公众号推文</text>
  <text x="36" y="392" fill="#555" font-size="13">• 微博 + 小红书区域矩阵号</text>
  <text x="36" y="422" fill="#333" font-size="14" font-weight="bold">线下</text>
  <text x="36" y="444" fill="#555" font-size="13">• 门店TV轮播屏（多台/店）</text>
  <text x="36" y="464" fill="#555" font-size="13">• 覆盖数千家门店</text>
  <rect x="36" y="478" width="370" height="20" rx="4" fill="#FDEDEC"/>
  <text x="46" y="493" fill="#C0392B" font-size="12">纸质物料本期不做，先跑MVP看效果</text>

  <rect x="20" y="530" width="400" height="180" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="530" width="400" height="38" rx="12" fill="#4A6CF7"/>
  <rect x="20" y="556" width="400" height="12" fill="#4A6CF7"/>
  <text x="36" y="555" fill="#FFFFFF" font-size="15" font-weight="bold">品牌A提供资源</text>
  <text x="36" y="590" fill="#333" font-size="14" font-weight="bold">线上（基本确定）</text>
  <text x="36" y="612" fill="#555" font-size="13">• 公众号 / 微博 / 视频号 / 小红书</text>
  <text x="36" y="632" fill="#555" font-size="13">• 私域社群 + 短信</text>
  <text x="36" y="660" fill="#333" font-size="14" font-weight="bold">线下</text>
  <text x="36" y="682" fill="#555" font-size="13">• 门店电子屏（需逐个协调）</text>
  <rect x="36" y="696" width="370" height="4" rx="2" fill="#F0F0F0"/>

  <rect x="20" y="730" width="400" height="210" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="730" width="400" height="38" rx="12" fill="#27AE60"/>
  <rect x="20" y="756" width="400" height="12" fill="#27AE60"/>
  <text x="36" y="755" fill="#FFFFFF" font-size="15" font-weight="bold">领券链路（已敲定）</text>
  <text x="36" y="790" fill="#555" font-size="13">1. 品牌B小程序Banner → 进入H5领券页</text>
  <text x="36" y="814" fill="#555" font-size="13">2. H5展示双方券（品牌A + 品牌B）</text>
  <text x="36" y="838" fill="#555" font-size="13">3. 点品牌B券 → 直接领到卡包</text>
  <text x="36" y="862" fill="#555" font-size="13">4. 点品牌A券 → 跳转品牌A小程序领取</text>
  <rect x="36" y="882" width="370" height="44" rx="6" fill="#FFF3E0"/>
  <text x="46" y="900" fill="#E65100" font-size="12" font-weight="bold">关键决定：不用CDK，直接领券链接跳转</text>
  <text x="46" y="918" fill="#E65100" font-size="12">用H5热区跳转，双方券同页展示满足审核</text>

  <rect x="20" y="960" width="400" height="160" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="960" width="400" height="38" rx="12" fill="#E67E22"/>
  <rect x="20" y="986" width="400" height="12" fill="#E67E22"/>
