<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 1680" width="100%" style="max-width: 440px;">
  <style>
    text { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  </style>
  <rect width="440" height="1680" rx="16" fill="#F7F8FA"/>

  <rect x="20" y="20" width="400" height="90" rx="12" fill="#1A1A2E"/>
  <text x="220" y="48" text-anchor="middle" fill="#FFFFFF" font-size="19" font-weight="bold">某门店 · 周年庆活动方案</text>
  <text x="220" y="72" text-anchor="middle" fill="#A0A0B8" font-size="14">「消费满赠」活动方案对齐</text>
  <text x="220" y="96" text-anchor="middle" fill="#666" font-size="12">门店方 × 运营团队 × 督导</text>

  <rect x="20" y="130" width="400" height="160" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="130" width="400" height="38" rx="12" fill="#95A5A6"/>
  <rect x="20" y="156" width="400" height="12" fill="#95A5A6"/>
  <text x="36" y="155" fill="#FFFFFF" font-size="15" font-weight="bold">活动背景</text>
  <text x="36" y="190" fill="#555" font-size="13">• 中型门店，十余名员工</text>
  <text x="36" y="212" fill="#555" font-size="13">• 堂食客单价：约XX元</text>
  <text x="36" y="234" fill="#555" font-size="13">• 活动档期：为期约十天</text>
  <text x="36" y="256" fill="#555" font-size="13">• 券生效：活动结束后次日起，有效期较长</text>

  <rect x="20" y="310" width="400" height="300" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="310" width="400" height="38" rx="12" fill="#E74C3C"/>
  <rect x="20" y="336" width="400" height="12" fill="#E74C3C"/>
  <text x="36" y="335" fill="#FFFFFF" font-size="15" font-weight="bold">已确认方案 · 消费满赠</text>
  <text x="36" y="370" fill="#333" font-size="14" font-weight="bold">核心逻辑</text>
  <text x="36" y="392" fill="#555" font-size="13">消费X元 → 送价值X元券包（多张组合）</text>
  <text x="36" y="412" fill="#555" font-size="13">券包内每张券有使用门槛（如满Y减Z）</text>
  <text x="36" y="442" fill="#333" font-size="14" font-weight="bold">档位设置</text>
  <text x="36" y="464" fill="#555" font-size="13">• 多个消费档位</text>
  <text x="36" y="484" fill="#555" font-size="13">• 每档送等额券包，拆分为多张有门槛券</text>
  <text x="36" y="504" fill="#555" font-size="13">• 单张券折扣控制在一定范围内</text>
  <text x="36" y="534" fill="#333" font-size="14" font-weight="bold">使用规则</text>
  <text x="36" y="556" fill="#555" font-size="13">• 活动期间每天消费均可领券（不限次数）</text>
  <text x="36" y="576" fill="#555" font-size="13">• 一笔订单只能用一张券，不可叠加</text>
  <text x="36" y="596" fill="#555" font-size="13">• 券在活动结束后才生效，避免冲突</text>

  <rect x="20" y="630" width="400" height="140" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="630" width="400" height="38" rx="12" fill="#27AE60"/>
  <rect x="20" y="656" width="400" height="12" fill="#27AE60"/>
  <text x="36" y="655" fill="#FFFFFF" font-size="15" font-weight="bold">顾客领券 &amp; 用券链路</text>
  <rect x="36" y="680" width="370" height="36" rx="8" fill="#E8F8F5"/>
  <text x="46" y="694" fill="#1E8449" font-size="13" font-weight="bold">领券</text>
  <text x="46" y="710" fill="#555" font-size="12">出示会员码 → 收银登录 → 结账 → 券自动到卡包</text>
  <rect x="36" y="724" width="370" height="36" rx="8" fill="#EBF5FB"/>
  <text x="46" y="738" fill="#2471A3" font-size="13" font-weight="bold">用券</text>
  <text x="46" y="754" fill="#555" font-size="12">出示会员码 → 收银登录 → 结账时选券抵扣</text>

  <rect x="20" y="790" width="400" height="180" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="790" width="400" height="38" rx="12" fill="#E67E22"/>
  <rect x="20" y="816" width="400" height="12" fill="#E67E22"/>
  <text x="36" y="815" fill="#FFFFFF" font-size="15" font-weight="bold">时间节奏</text>
  <rect x="36" y="840" width="8" height="40" rx="4" fill="#E67E22"/>
  <text x="54" y="856" fill="#333" font-size="13" font-weight="bold">今日</text>
  <text x="54" y="874" fill="#555" font-size="12">运营团队输出档位+券面额+门槛表格</text>
  <rect x="36" y="888" width="8" height="40" rx="4" fill="#E67E22"/>
  <text x="54" y="904" fill="#333" font-size="13" font-weight="bold">明日</text>
  <text x="54" y="922" fill="#555" font-size="12">配置完成，门店测试领券+用券链路</text>
  <rect x="36" y="936" width="8" height="24" rx="4" fill="#27AE60"/>
  <text x="54" y="952" fill="#1E8449" font-size="13" font-weight="bold">后天 · 活动正式上线</text>

  <rect x="20" y="990" width="400" height="280" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="990" width="400" height="38" rx="12" fill="#1A1A2E"/>
  <rect x="20" y="1016" width="400" height="12" fill="#1A1A2E"/>
  <text x="36" y="1015" fill="#FFFFFF" font-size="15" font-weight="bold">待办清单</text>
  <text x="36" y="1048" fill="#FF6B6B" font-size="14" font-weight="bold">运营团队（我方）</text>
  <rect x="36" y="1060" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="1075" fill="#333" font-size="13">今日：输出档位+券面额+门槛明细表</text>
  <rect x="36" y="1084" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="1099" fill="#333" font-size="13">明日：完成券配置+活动配置，提供测试</text>
  <rect x="36" y="1108" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="1123" fill="#333" font-size="13">评估可叠加的其他活动，群内同步</text>
  <text x="36" y="1156" fill="#4ECDC4" font-size="14" font-weight="bold">门店方</text>
  <rect x="36" y="1168" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="1183" fill="#333" font-size="13">确认档位表（群内回复）</text>
  <rect x="36" y="1192" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="1207" fill="#333" font-size="13">安排收银员测试领券+用券链路</text>
  <rect x="36" y="1216" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="1231" fill="#333" font-size="13">确认是否叠加其他活动（人手是否够）</text>

  <rect x="20" y="1290" width="400" height="190" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="1290" width="400" height="38" rx="12" fill="#95A5A6"/>
  <rect x="20" y="1316" width="400" height="12" fill="#95A5A6"/>
  <text x="36" y="1315" fill="#FFFFFF" font-size="15" font-weight="bold">备注</text>
  <text x="36" y="1350" fill="#555" font-size="13">• 老店，日营业额稳定，忠实客群多</text>
  <text x="36" y="1372" fill="#555" font-size="13">• 学生群体占比高，活动期间可能每天来</text>
  <text x="36" y="1394" fill="#555" font-size="13">• 对面竞品在做会员返卡费活动</text>
  <text x="36" y="1416" fill="#555" font-size="13">• 储值暂不可行（无对公账户）</text>
  <rect x="36" y="1436" width="370" height="30" rx="6" fill="#E8F8F5"/>
  <text x="46" y="1456" fill="#1E8449" font-size="13">目标：冲刺活动期间堂食营业额历史新高</text>
</svg>
