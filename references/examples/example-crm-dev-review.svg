<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 2680" width="100%" style="max-width: 440px;">
  <style>
    text { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  </style>

  <rect width="440" height="2680" rx="16" fill="#F7F8FA"/>

  <rect x="20" y="20" width="400" height="80" rx="12" fill="#1A1A2E"/>
  <text x="220" y="52" text-anchor="middle" fill="#FFFFFF" font-size="21" font-weight="bold">品牌方 × 技术服务商 CRM二期</text>
  <text x="220" y="78" text-anchor="middle" fill="#A0A0B8" font-size="14">会员系统开发需求确认</text>

  <rect x="20" y="120" width="400" height="200" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="120" width="400" height="40" rx="12" fill="#4A6CF7"/>
  <rect x="20" y="148" width="400" height="12" fill="#4A6CF7"/>
  <text x="36" y="146" fill="#FFFFFF" font-size="16" font-weight="bold">一、整体费用概览</text>
  <text x="36" y="185" fill="#333" font-size="14">• 需求总报价（含全部模块）：约 XX万</text>
  <text x="36" y="210" fill="#333" font-size="14">• 会议筛选后会员相关：约 XX万</text>
  <text x="36" y="235" fill="#333" font-size="14">• 预估工期：约X个月</text>
  <text x="36" y="260" fill="#999" font-size="13">• 非会员需求（外卖对接等）单独走合同</text>
  <text x="36" y="285" fill="#999" font-size="13">• 合同需过决策委员会评审（新流程）</text>

  <rect x="20" y="340" width="400" height="380" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="340" width="400" height="40" rx="12" fill="#27AE60"/>
  <rect x="20" y="368" width="400" height="12" fill="#27AE60"/>
  <text x="36" y="366" fill="#FFFFFF" font-size="16" font-weight="bold">二、确认要做的需求</text>
  <text x="36" y="400" fill="#333" font-size="14" font-weight="bold">门店组装服务</text>
  <text x="36" y="420" fill="#666" font-size="13">数千门店管理必须项</text>
  <text x="36" y="448" fill="#333" font-size="14" font-weight="bold">区域化配置（会员权益分区域）</text>
  <text x="36" y="468" fill="#666" font-size="13">不同省份/区域的折扣、兑换差异化</text>
  <text x="36" y="496" fill="#333" font-size="14" font-weight="bold">门店标签支持多选</text>
  <text x="36" y="516" fill="#666" font-size="13">当前仅支持单标签，改为多标签（工期短）</text>
  <text x="36" y="544" fill="#333" font-size="14" font-weight="bold">订阅消息优化（订单评价落地页）</text>
  <text x="36" y="564" fill="#666" font-size="13">订阅消息增加变量 + 评价跳转，优先级高</text>
  <text x="36" y="592" fill="#333" font-size="14" font-weight="bold">券类型补齐（买赠/满赠/满减）</text>
  <text x="36" y="612" fill="#666" font-size="13">服务商调接口 + 出文档，POS端同步开发</text>
  <text x="36" y="640" fill="#333" font-size="14" font-weight="bold">兑换详情可维护（降级方案）</text>
  <text x="36" y="660" fill="#666" font-size="13">原方案工期较长 → 压缩过半，支持自维护</text>
  <text x="36" y="688" fill="#333" font-size="14" font-weight="bold">门店清单导入在线交互优化</text>
  <text x="36" y="708" fill="#666" font-size="13">提升运营伙伴操作效率</text>

  <rect x="20" y="740" width="400" height="300" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="740" width="400" height="40" rx="12" fill="#F39C12"/>
  <rect x="20" y="768" width="400" height="12" fill="#F39C12"/>
  <text x="36" y="766" fill="#FFFFFF" font-size="16" font-weight="bold">三、调整 / 降级的需求</text>
  <text x="36" y="800" fill="#333" font-size="14" font-weight="bold">任务/打卡模块重构</text>
  <text x="36" y="820" fill="#666" font-size="13">原方案：按模板整体迁移，评估工期较长</text>
  <text x="36" y="840" fill="#E65100" font-size="13">调整：不做整套迁移，仅解决现有任务的</text>
  <text x="36" y="858" fill="#E65100" font-size="13">后台可配置化问题，降低成本</text>
  <text x="36" y="888" fill="#333" font-size="14" font-weight="bold">全局折叠/性能优化</text>
  <text x="36" y="908" fill="#666" font-size="13">原方案工期较长 → 选择轻量方案</text>
  <text x="36" y="928" fill="#E65100" font-size="13">效果一致，投入产出比更优</text>
  <text x="36" y="958" fill="#333" font-size="14" font-weight="bold">抽奖活动区域限制</text>
  <text x="36" y="978" fill="#666" font-size="13">当前抽奖页无定位，区域限制不生效</text>
  <text x="36" y="998" fill="#E65100" font-size="13">方案：从首页带入定位 + 授权弹窗</text>
  <text x="36" y="1028" fill="#333" font-size="14" font-weight="bold">兑换状态提示优化（避免客诉）</text>
  <text x="36" y="1048" fill="#666" font-size="13">列表页提前展示"已兑换/不可兑换"状态</text>

  <rect x="20" y="1060" width="400" height="220" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="1060" width="400" height="40" rx="12" fill="#E74C3C"/>
  <rect x="20" y="1088" width="400" height="12" fill="#E74C3C"/>
  <text x="36" y="1086" fill="#FFFFFF" font-size="16" font-weight="bold">四、暂不做 / 搁置</text>
  <text x="36" y="1120" fill="#333" font-size="14" font-weight="bold">摇一摇身份开发</text>
  <text x="36" y="1140" fill="#666" font-size="13">评估工期较长，当前阶段不做</text>
  <text x="36" y="1168" fill="#333" font-size="14" font-weight="bold">抽奖混评功能</text>
  <text x="36" y="1188" fill="#666" font-size="13">整体去掉</text>
  <text x="36" y="1216" fill="#333" font-size="14" font-weight="bold">促销中心 / 营销中台</text>
  <text x="36" y="1236" fill="#666" font-size="13">品牌方认为有长期价值，但涉及POS/支付等</text>
  <text x="36" y="1256" fill="#666" font-size="13">多端改造，体量大，此前已被内部搁置</text>
  <text x="36" y="1276" fill="#E65100" font-size="13">品牌方会重新推动立项，后续单独评估</text>

  <rect x="20" y="1300" width="400" height="340" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="1300" width="400" height="40" rx="12" fill="#8E44AD"/>
  <rect x="20" y="1328" width="400" height="12" fill="#8E44AD"/>
  <text x="36" y="1326" fill="#FFFFFF" font-size="16" font-weight="bold">五、支付核销一体（重点议题）</text>
  <text x="36" y="1360" fill="#333" font-size="14" font-weight="bold">目标场景</text>
  <text x="36" y="1380" fill="#666" font-size="13">顾客在POS端微信支付时，自动识别会员身份</text>
  <text x="36" y="1400" fill="#666" font-size="13">并展示可用券（折扣券），收银员手动选中核销</text>
  <text x="36" y="1428" fill="#333" font-size="14" font-weight="bold">技术链路（已达成共识）</text>
  <text x="36" y="1448" fill="#666" font-size="13">1. 支付通道扫付款码 → 接口获取用户身份</text>
  <text x="36" y="1468" fill="#666" font-size="13">2. POS拿身份ID → 调CRM接口查会员+券</text>
  <text x="36" y="1488" fill="#666" font-size="13">3. POS展示可用券 → 收银员手动选中 → 核销</text>
  <text x="36" y="1516" fill="#333" font-size="14" font-weight="bold">当前范围</text>
  <text x="36" y="1536" fill="#E65100" font-size="13">• 仅限折扣券，不含商品券/兑换券</text>
  <text x="36" y="1556" fill="#E65100" font-size="13">• 手动选券模式（非自动最优选）</text>
  <text x="36" y="1576" fill="#E65100" font-size="13">• 需POS端配合开发，服务商提供查询接口</text>
  <text x="36" y="1604" fill="#333" font-size="14" font-weight="bold">卡点</text>
  <text x="36" y="1624" fill="#999" font-size="13">POS端改动较大，需品牌方内部推动排期</text>

  <rect x="20" y="1660" width="400" height="240" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="1660" width="400" height="40" rx="12" fill="#2980B9"/>
  <rect x="20" y="1688" width="400" height="12" fill="#2980B9"/>
  <text x="36" y="1686" fill="#FFFFFF" font-size="16" font-weight="bold">六、免订阅消息触达（移动支付）</text>
  <text x="36" y="1720" fill="#333" font-size="14" font-weight="bold">能力说明</text>
  <text x="36" y="1740" fill="#666" font-size="13">顾客支付后短时间内可推送服务消息</text>
  <text x="36" y="1760" fill="#666" font-size="13">不受限于是否会员/是否订阅，可带小程序入口</text>
  <text x="36" y="1790" fill="#333" font-size="14" font-weight="bold">范围确认</text>
  <text x="36" y="1810" fill="#E65100" font-size="13">• 仅做小程序端（线上），不含POS线下端</text>
  <text x="36" y="1830" fill="#E65100" font-size="13">• 根据支付方式弹不同消息组</text>
  <text x="36" y="1850" fill="#E65100" font-size="13">  （线上支付→活动通知 / 储值支付→消费通知）</text>
  <text x="36" y="1878" fill="#333" font-size="14">评估：仅线上部分可压缩工期</text>

  <rect x="20" y="1920" width="400" height="360" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="1920" width="400" height="40" rx="12" fill="#E67E22"/>
  <rect x="20" y="1948" width="400" height="12" fill="#E67E22"/>
  <text x="36" y="1946" fill="#FFFFFF" font-size="16" font-weight="bold">七、一期遗留 + 渠道对接</text>
  <text x="36" y="1980" fill="#333" font-size="14" font-weight="bold">渠道对接（二期合同）</text>
  <rect x="36" y="1995" width="370" height="28" rx="4" fill="#E8F5E9"/>
  <text x="46" y="2014" fill="#2E7D32" font-size="13">已完成：渠道A、渠道B</text>
  <rect x="36" y="2028" width="370" height="28" rx="4" fill="#FFF3E0"/>
  <text x="46" y="2047" fill="#E65100" font-size="13">开发完成待联调：渠道C（暂停中）</text>
  <rect x="36" y="2061" width="370" height="28" rx="4" fill="#FFF3E0"/>
  <text x="46" y="2080" fill="#E65100" font-size="13">开发完成待对接：渠道D（对方侧换人）</text>
  <rect x="36" y="2094" width="370" height="44" rx="4" fill="#FFEBEE"/>
  <text x="46" y="2113" fill="#C62828" font-size="13">卡在对方审核：渠道E（已等数周，需催促）</text>
  <text x="46" y="2131" fill="#C62828" font-size="13">  </text>
  <text x="36" y="2165" fill="#333" font-size="14" font-weight="bold">一期其他遗留</text>
  <text x="36" y="2185" fill="#666" font-size="13">• 团购券聚合核销 → POS下版本排入</text>
  <text x="36" y="2205" fill="#666" font-size="13">• 邀请小程序 → 做了一半，下周继续</text>
  <text x="36" y="2225" fill="#666" font-size="13">• 券适用范围调整 → 本周优先处理</text>

  <rect x="20" y="2300" width="400" height="360" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="20" y="2300" width="400" height="40" rx="12" fill="#1A1A2E"/>
  <rect x="20" y="2328" width="400" height="12" fill="#1A1A2E"/>
  <text x="36" y="2326" fill="#FFFFFF" font-size="16" font-weight="bold">八、待办事项</text>
  <text x="36" y="2360" fill="#4ECDC4" font-size="14" font-weight="bold">技术服务商</text>
  <rect x="36" y="2372" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="2387" fill="#333" font-size="13">今日出合同（含会员需求部分）</text>
  <rect x="36" y="2398" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="2413" fill="#333" font-size="13">需求表标注会员/非会员分类</text>
  <rect x="36" y="2424" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="2439" fill="#333" font-size="13">本周优先：券适用范围 + 渠道C联调准备</text>
  <rect x="36" y="2450" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="2465" fill="#333" font-size="13">下周：邀请小程序功能继续开发</text>
  <rect x="36" y="2476" width="18" height="18" rx="3" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="62" y="2491" fill="#333" font-size="13">明日上午：参加渠道D对齐会议</text>
  <text x="36" y="2520" fill="#FF6B6B" font-size="14" font-weight="bold">品牌方</text>
  <rect x="36" y="2532" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="2547" fill="#333" font-size="13">下周约决策委员会评审</text>
  <rect x="36" y="2558" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="2573" fill="#333" font-size="13">内部推动POS团队排期（支付核销一体）</text>
  <rect x="36" y="2584" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="2599" fill="#333" font-size="13">重新推动促销中心/营销中台立项</text>
  <rect x="36" y="2610" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="2625" fill="#333" font-size="13">催促渠道E审核进度</text>
  <rect x="36" y="2636" width="18" height="18" rx="3" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="62" y="2651" fill="#333" font-size="13">提供兑换状态提示语文案</text>
</svg>
